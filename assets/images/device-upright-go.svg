<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Original line illustration of an Upright GO 1 posture trainer,
     drawn in the app's brand stroke style (see specs/design_decisions.md).
     Not derived from any photograph or UPRIGHT asset. -->
<svg width="132" height="132" viewBox="0 0 132 132" xmlns="http://www.w3.org/2000/svg">
  <!-- pebble body -->
  <rect x="31" y="11" width="70" height="110" rx="31"
        fill="none" stroke="#202832" stroke-width="5.5"/>
  <!-- embossed lightning bolt, simplified to a zigzag stroke -->
  <path d="M 71 31 L 62 48 L 69 48 L 60 64"
        fill="none" stroke="#202832" stroke-width="3.5"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- status LED — the single brand-amber accent -->
  <line x1="66" y1="71" x2="66" y2="77"
        stroke="#F5A623" stroke-width="4.5" stroke-linecap="round"/>
  <!-- button dimple -->
  <circle cx="66" cy="97" r="13.5"
          fill="none" stroke="#202832" stroke-width="3.5"/>
</svg>
