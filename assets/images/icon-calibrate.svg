<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Calibration glyph: dashed spine axis with alignment marks either side.
     Original artwork in the brand stroke style (specs/design_decisions.md). -->
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <g stroke="#202832" stroke-width="2" stroke-linecap="round" fill="none">
    <!-- dashed vertical axis -->
    <path d="M12 3 V 5.5"/>
    <path d="M12 9 V 11.5"/>
    <path d="M12 15 V 17.5"/>
    <path d="M12 21 V 21.01"/>
    <!-- alignment marks, left -->
    <path d="M4 9.5 H 9"/>
    <path d="M5.5 14.5 H 9"/>
    <!-- alignment marks, right -->
    <path d="M15 7.5 H 20"/>
    <path d="M15 12.5 H 18.5"/>
  </g>
</svg>
